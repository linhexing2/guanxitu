<!DOCTYPE html>
<html>
<body>
<h1>GitHub API Test</h1>
<button onclick="testGitHubAPI()">Test GitHub API</button>
<div id="result"></div>

<script>
function testGitHubAPI() {
  const url = 'https://raw.githubusercontent.com/linhexing2/guanxitu/main/main.json';
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = 'Testing...';
  
  fetch(url, {
    method: 'GET',
    headers: {
      'Accept': 'application/json'
    }
  })
  .then(response => {
    resultDiv.innerHTML = `Status: ${response.status}<br>Status Text: ${response.statusText}`;
    if (response.ok) {
      return response.text();
    } else {
      throw new Error('Network response was not ok');
    }
  })
  .then(data => {
    resultDiv.innerHTML += `<br><br>Response Data: ${data}`;
  })
  .catch(error => {
    resultDiv.innerHTML += `<br><br>Error: ${error.message}`;
  });
}
</script>
</body>
</html>
